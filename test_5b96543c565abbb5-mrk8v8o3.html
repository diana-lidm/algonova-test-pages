  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #F7F4FF; color: #180620; min-height: 100vh; }
    .page { max-width: 720px; margin: 0 auto; padding: 0 0 48px; }

    #certificado { text-align: center; margin-bottom: 20px; }
    #certificado img { width: 100%; display: block; box-shadow: 0 4px 24px rgba(95,58,190,.15); }

    #precio { background: #fff; border-radius: 16px; padding: 20px 16px; margin: 0 12px 16px; }
    #precio h2 { font-size: 1.1rem; color: #5F3ABE; margin-bottom: 8px; }
    .duration { font-size: .95rem; color: #6b5f80; margin-bottom: 16px; }
    .cta-btn { display: block; background: #5F3ABE; color: #fff; text-decoration: none; text-align: center; padding: 14px 24px; border-radius: 10px; font-size: 1rem; font-weight: 600; }
    .cta-fallback { background: #F7F4FF; border-radius: 10px; padding: 14px 16px; font-size: .95rem; color: #5F3ABE; border: 1px solid #D4C8FF; }

    #que-espera { background: #fff; border-radius: 16px; padding: 20px 16px; margin: 0 12px 16px; }
    #que-espera h2 { font-size: 1rem; color: #5F3ABE; margin-bottom: 16px; line-height: 1.4; }
    #que-espera h2 span { color: #180620; font-weight: 700; }
    #que-espera ul { list-style: none; display: flex; flex-direction: column; gap: 12px; }
    #que-espera li { display: flex; align-items: flex-start; gap: 10px; font-size: 1rem; line-height: 1.5; }
    #que-espera li::before { content: "✓"; flex-shrink: 0; width: 22px; height: 22px; background: #5F3ABE; color: #fff; border-radius: 50%; font-size: .75rem; font-weight: 700; display: flex; align-items: center; justify-content: center; margin-top: 2px; }

    #proyectos { margin: 0 12px 16px; }
    #proyectos h2 { font-size: 1rem; color: #5F3ABE; margin-bottom: 12px; }
    .proj-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .proj-item { background: #fff; border-radius: 12px; overflow: hidden; }
    .proj-item img { width: 100%; display: block; aspect-ratio: 16/10; object-fit: contain; background: #111; }
    .proj-item p { font-size: .75rem; color: #5F3ABE; text-align: center; padding: 6px 8px; }

    #plan { margin: 0 12px 16px; }
    #plan h2 { font-size: 1rem; color: #5F3ABE; margin-bottom: 12px; }
    .mod { background: #EDE8FF; border-radius: 12px; margin-bottom: 8px; overflow: hidden; }
    .mod-header { display: flex; align-items: center; gap: 8px; padding: 14px 16px; cursor: pointer; list-style: none; user-select: none; }
    .mod-header::-webkit-details-marker { display: none; }
    .mod-title { flex: 1; font-size: .95rem; font-weight: 600; color: #180620; }
    .mod-count { font-size: .8rem; color: #5F3ABE; }
    .mod-arrow { font-size: 1.1rem; color: #A38AFF; transition: transform .2s; }
    details[open] .mod-arrow { transform: rotate(90deg); }
    .mod-lessons { list-style: none; padding: 0 16px 12px; display: flex; flex-direction: column; gap: 6px; }
    .mod-lessons li { font-size: .9rem; color: #180620; line-height: 1.4; }
    .lec-num { color: #A38AFF; font-weight: 600; }
    .mod-resultado { font-size: .85rem; color: #5c4d80; line-height: 1.5; padding: 10px 16px 14px; border-top: 1px solid #D4C8FF; margin-top: 4px; }
    .mod-resultado strong { color: #180620; }

    #por-que { background: #EDE8FF; border-radius: 16px; padding: 20px 16px; margin: 0 12px 16px; }
    #por-que h2 { font-size: 1rem; color: #5F3ABE; margin-bottom: 14px; }
    #por-que ul { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    #por-que li { font-size: .9rem; line-height: 1.5; padding-left: 14px; border-left: 3px solid #A38AFF; border-radius: 0; }

    footer { text-align: center; margin-top: 32px; font-size: .8rem; color: #A38AFF; }

    @media (min-width: 640px) {
      .page { padding: 24px 16px 48px; }
      #certificado img { border-radius: 16px; width: 100%; }
      #certificado { margin-bottom: 24px; padding: 0 16px; }
      #precio, #que-espera, #plan, #por-que { margin: 0 0 24px; padding: 24px; }
      #proyectos { margin: 0 0 24px; }
      #plan { padding: 0; }
      #precio h2, #que-espera h2 { font-size: 1.25rem; }
      #por-que h2 { font-size: 1.1rem; }
      #por-que li { font-size: .95rem; }
    }
